name: Send GodMorgenSarpsborg-daglig

on:
  schedule:
    # Kjører kl 08:00 UTC, som er kl 09:00 i Norge (CET)
    - cron: '0 8 * * *'
  workflow_dispatch: # Gjør det mulig å starte den manuelt fra GitHub Actions-fanen

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Sjekk ut kode
        uses: actions/checkout@v3

      - name: Sett opp Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installer avhengigheter
        run: |
          pip install google-genai requests

      - name: Kjør script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python GodMorgenSarpsborg.py
